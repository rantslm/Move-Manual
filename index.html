<!DOCTYPE html>

  <head>

    <title>Move Manual | Home</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- style sheet -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="app-page">
    <!-- Header: full-width across desktop and mobile -->
    <header class="app-header">
      <!-- Placeholder logo SWAP FOR LOGO -->
      <div class="app-header__logo"></div>
      <h1 class="app-header__title">Home</h1>

    <!-- Main: centered gradient app shell -->
    <main class="app-main">
      <div class="app-shell">
        <div class="app-content">
          <!-- Recently Saved section -->
          <section class="mb-4">
            <h2 class="section-title">Recently Saved</h2>

            <!-- glassy cards using Bootstrap grid -->
            <div class="d-flex gap-3">
              <div class="card-glass flex-fill">
                <div class="muted-label">Exercise Title</div>
              </div>
              <div class="card-glass flex-fill">

          <section class="mb-4">
            <h2 class="section-title">Discover New Exercises</h2>

            <!-- Search bar -->
            <input
              type="text"
              class="search-input form-control"
              placeholder="Search"
            />

            <!-- Filter bar -->
            <div class="filter-bar mt-2">
              <span>Filters</span>
              <span>▼</span>
            </div>
          </section>

          <!-- Workout Overview preview -->
          <section class="mb-4">
            <h2 class="section-title">Workout Overview</h2>

            <div class="d-flex gap-3">
              <div class="card-glass flex-fill" style="height: 140px"></div>
              <div class="card-glass flex-fill" style="height: 140px"></div>
            </div>
          </section>
        </div>
      </div>

    <!-- Footer -->
    <footer class="app-footer">
      <nav class="app-nav" aria-label="primary navigation">
        <!-- Home (active) -->
        <a href="index.html" class="nav-item nav-item--active">

        <!-- Discover -->

        </a>

        <!-- Saved -->

          <span class="nav-item__icon"></span>
          <span>saved</span>
        </a>

        <!-- Overview -->
        <a href="overview.html" class="nav-item">
          <span class="nav-item__icon"></span>
          <span>overview</span>
        </a>
      </nav>
